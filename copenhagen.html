<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copenhagen · May 28</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #f5f3ee;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      padding: 18px 28px 14px;
      background: #fff;
      border-bottom: 1px solid #e2ddd5;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    .header .meta {
      font-size: 0.85rem;
      color: #999;
      font-style: italic;
    }

    .header .notes {
      margin-left: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.02em;
    }

    /* ── FILTER BAR ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 10px 28px;
      background: #faf9f6;
      border-bottom: 1px solid #e2ddd5;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      background: #fff;
      color: #555;
      letter-spacing: 0.03em;
    }

    .filter-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-btn.active {
      color: #1a1a1a;
    }

    .filter-btn.inactive {
      opacity: 0.4;
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── POPUPS ── */
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid #e2ddd5 !important;
    }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-family: 'Georgia', serif !important;
    }

    .popup-name {
      font-size: 0.95rem;
      font-weight: bold;
      color: #1a1a1a;
    }

    .popup-cat {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 2px;
    }

    .popup-note {
      font-size: 0.82rem;
      color: #666;
      margin-top: 6px;
      font-style: italic;
    }

    .leaflet-popup-tip { background: #fff !important; }
  </style>
</head>
<body>

<div class="header">
  <h1>Copenhagen</h1>
  <span class="meta">May 28 &nbsp;&middot;&nbsp; 3–4 nights</span>
  <span class="notes">Bike the city &nbsp;&middot;&nbsp; Trains &nbsp;&middot;&nbsp; Consider Copenhagen Card</span>
</div>

<div class="filters" id="filters"></div>

<div id="map"></div>

<script>
  /* ── CATEGORIES ── */
  const cats = {
    attraction: { label: 'Attractions', color: '#e05c4b' },
    castle:     { label: 'Castles',     color: '#7c3aed' },
    mall:       { label: 'Shopping',    color: '#d97706' },
    coffee:     { label: 'Coffee',      color: '#78350f' },
    restaurant: { label: 'Food',        color: '#ea580c' },
    museum:     { label: 'Museums',     color: '#2563eb' },
    club:       { label: 'Nightlife',   color: '#db2777' },
  };

  /* ── PLACES ── */
  const places = [
    // Attractions
    { name: 'The Little Mermaid',     cat: 'attraction', lat: 55.6929, lon: 12.5994 },
    { name: 'Tivoli Gardens',         cat: 'attraction', lat: 55.6736, lon: 12.5682 },
    { name: 'Nyhavn',                 cat: 'attraction', lat: 55.6800, lon: 12.5905 },
    { name: "The King's Garden",      cat: 'attraction', lat: 55.6853, lon: 12.5797 },
    { name: 'The Round Tower',        cat: 'attraction', lat: 55.6814, lon: 12.5761 },
    { name: 'Strøget',                cat: 'attraction', lat: 55.6780, lon: 12.5735, note: 'Main pedestrian street' },
    { name: 'Havnegade Trampolines',  cat: 'attraction', lat: 55.6749, lon: 12.5872 },

    // Castles
    { name: 'Rosenborg Castle',       cat: 'castle', lat: 55.6859, lon: 12.5771 },
    { name: 'Christiansborg Palace',  cat: 'castle', lat: 55.6763, lon: 12.5797, note: 'Danish Parliament, Supreme Court' },
    { name: 'Amalienborg Palace',     cat: 'castle', lat: 55.6844, lon: 12.5928, note: 'Royal residence — changing of guard at noon' },
    { name: 'Kastellet',              cat: 'castle', lat: 55.6913, lon: 12.5940, note: 'Star-shaped 17th-century fortress' },
    { name: 'Frederiksberg Palace',   cat: 'castle', lat: 55.6763, lon: 12.5275, note: 'Baroque palace on Frederiksberg Hill' },

    // Shopping
    { name: 'Fisketorvet',            cat: 'mall', lat: 55.6626, lon: 12.5624, note: 'Kalvebod Brygge waterfront' },
    { name: 'Magasin du Nord',        cat: 'mall', lat: 55.6792, lon: 12.5834, note: 'Kongens Nytorv 13 — large department store' },

    // Coffee
    { name: 'Studenterhuset',         cat: 'coffee', lat: 55.6814, lon: 12.5763, note: 'Købmagergade 52, next to Round Tower' },

    // Food
    { name: 'Union Kitchen (Nyhavn)', cat: 'restaurant', lat: 55.6818, lon: 12.5923, note: 'Store Strandstræde 21, near Nyhavn' },
    { name: 'Union Kitchen (Østerbro)', cat: 'restaurant', lat: 55.6904, lon: 12.5755, note: 'Øster Farimagsgade 16A, beside Rosenborg' },

    // Museums
    { name: 'Copenhagen War Museum',  cat: 'museum', lat: 55.6756, lon: 12.5815, note: 'Royal Danish Arsenal, Slotsholmen' },

    // Nightlife
    { name: 'Chateau Motel',          cat: 'club', lat: 55.6782, lon: 12.5747, note: 'Knabrostræde 3, city center' },
    { name: 'Søpavillonen',           cat: 'club', lat: 55.6819, lon: 12.5590, note: 'Gyldenløvesgade 24, between the lakes' },
  ];

  /* ── MAP ── */
  const map = L.map('map').setView([55.6790, 12.5620], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  /* ── MARKERS ── */
  const markers = {};
  const activeFilters = new Set(Object.keys(cats));

  places.forEach(p => {
    const c = cats[p.cat];

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:14px;height:14px;
        background:${c.color};
        border:2.5px solid #fff;
        border-radius:50%;
        box-shadow:0 1px 5px rgba(0,0,0,0.3);
      "></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });

    const popup = L.popup({ offset: [0, -6], closeButton: false }).setContent(
      `<div class="popup-name">${p.name}</div>` +
      `<div class="popup-cat" style="color:${c.color}">${c.label}</div>` +
      (p.note ? `<div class="popup-note">${p.note}</div>` : '')
    );

    const m = L.marker([p.lat, p.lon], { icon }).addTo(map).bindPopup(popup);

    if (!markers[p.cat]) markers[p.cat] = [];
    markers[p.cat].push(m);
  });

  /* ── FILTER BUTTONS ── */
  const bar = document.getElementById('filters');

  Object.entries(cats).forEach(([key, c]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.dataset.cat = key;
    btn.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.label}`;
    btn.style.borderColor = c.color + '55';

    btn.addEventListener('click', () => {
      if (activeFilters.has(key)) {
        activeFilters.delete(key);
        btn.classList.remove('active');
        btn.classList.add('inactive');
        markers[key]?.forEach(m => m.remove());
      } else {
        activeFilters.add(key);
        btn.classList.add('active');
        btn.classList.remove('inactive');
        markers[key]?.forEach(m => m.addTo(map));
      }
    });

    bar.appendChild(btn);
  });
</script>
</body>
</html>
