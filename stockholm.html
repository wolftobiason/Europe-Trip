<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stockholm · Jun 1</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #f5f3ee;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      padding: 18px 28px 14px;
      background: #fff;
      border-bottom: 1px solid #e2ddd5;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    .header .meta {
      font-size: 0.85rem;
      color: #999;
      font-style: italic;
    }

    .header .notes {
      margin-left: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.02em;
    }

    /* ── FILTER BAR ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 10px 28px;
      background: #faf9f6;
      border-bottom: 1px solid #e2ddd5;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      background: #fff;
      color: #555;
      letter-spacing: 0.03em;
    }

    .filter-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-btn.active  { color: #1a1a1a; }
    .filter-btn.inactive { opacity: 0.4; }

    /* ── MAP ── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── POPUPS ── */
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid #e2ddd5 !important;
    }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-family: 'Georgia', serif !important;
    }

    .popup-name {
      font-size: 0.95rem;
      font-weight: bold;
      color: #1a1a1a;
    }

    .popup-cat {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 2px;
    }

    .popup-note {
      font-size: 0.82rem;
      color: #666;
      margin-top: 6px;
      font-style: italic;
    }

    .leaflet-popup-tip { background: #fff !important; }
  </style>
</head>
<body>

<div class="header">
  <h1>Stockholm</h1>
  <span class="meta">Jun 1 &nbsp;&middot;&nbsp; 3 nights</span>
  <span class="notes">SL metro pass &nbsp;&middot;&nbsp; Walk Gamla Stan &nbsp;&middot;&nbsp; Dinner with Bo</span>
</div>

<div class="filters" id="filters"></div>

<div id="map"></div>

<script>
  /* ── CATEGORIES ── */
  const cats = {
    hotel:      { label: 'Hotel',       color: '#0d9488' },
    attraction: { label: 'Attractions', color: '#e05c4b' },
    castle:     { label: 'Castles',     color: '#7c3aed' },
    museum:     { label: 'Museums',     color: '#2563eb' },
    restaurant: { label: 'Food',        color: '#ea580c' },
  };

  /* ── PLACES ── */
  const places = [
    // Hotel
    { name: 'Bank Hotel',              cat: 'hotel', lat: 59.3314, lon: 18.0747, note: 'Arsenalsgatan 6, 111 47 Stockholm' },

    // Attractions
    { name: 'Gamla Stan',              cat: 'attraction', lat: 59.3247, lon: 18.0714, note: 'Old Town — great for wandering, cobblestone streets' },

    // Castles
    { name: 'Royal Palace',            cat: 'castle', lat: 59.3268, lon: 18.0717, note: 'Kungliga Slottet — one of Europe\'s largest palaces' },

    // Museums
    { name: 'Vasa Museum',             cat: 'museum', lat: 59.3280, lon: 18.0914, note: 'Galärvarvsvägen 14, Djurgården — preserved 1628 warship' },
    { name: 'Army Museum',             cat: 'museum', lat: 59.3343, lon: 18.0798, note: 'Riddargatan 13 — Swedish military history' },
    { name: 'Livrustkammaren',         cat: 'museum', lat: 59.3265, lon: 18.0720, note: 'Royal Armoury, inside the Palace — oldest museum in Sweden' },
    { name: 'Nobel Prize Museum',      cat: 'museum', lat: 59.3253, lon: 18.0707, note: 'Stortorget 2, Gamla Stan' },
    { name: 'National Museum',         cat: 'museum', lat: 59.3286, lon: 18.0781, note: 'Södra Blasieholmshamnen — Swedish art & design' },

    // Food
    { name: 'Dinner in Gamla Stan',    cat: 'restaurant', lat: 59.3250, lon: 18.0720, note: 'Walk the old town then dinner — Bo\'s recommendation' },
  ];

  /* ── MAP ── */
  const map = L.map('map').setView([59.3295, 18.0810], 14);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  /* ── MARKERS ── */
  const markers = {};
  const activeFilters = new Set(Object.keys(cats));

  places.forEach(p => {
    const c = cats[p.cat];

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:14px;height:14px;
        background:${c.color};
        border:2.5px solid #fff;
        border-radius:50%;
        box-shadow:0 1px 5px rgba(0,0,0,0.3);
      "></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });

    const popup = L.popup({ offset: [0, -6], closeButton: false }).setContent(
      `<div class="popup-name">${p.name}</div>` +
      `<div class="popup-cat" style="color:${c.color}">${c.label}</div>` +
      (p.note ? `<div class="popup-note">${p.note}</div>` : '')
    );

    const m = L.marker([p.lat, p.lon], { icon }).addTo(map).bindPopup(popup);

    if (!markers[p.cat]) markers[p.cat] = [];
    markers[p.cat].push(m);
  });

  /* ── FILTER BUTTONS ── */
  const bar = document.getElementById('filters');

  Object.entries(cats).forEach(([key, c]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.dataset.cat = key;
    btn.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.label}`;
    btn.style.borderColor = c.color + '55';

    btn.addEventListener('click', () => {
      if (activeFilters.has(key)) {
        activeFilters.delete(key);
        btn.classList.remove('active');
        btn.classList.add('inactive');
        markers[key]?.forEach(m => m.remove());
      } else {
        activeFilters.add(key);
        btn.classList.add('active');
        btn.classList.remove('inactive');
        markers[key]?.forEach(m => m.addTo(map));
      }
    });

    bar.appendChild(btn);
  });
</script>
</body>
</html>
