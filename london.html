<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>London · May 26–27</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #f5f3ee;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      padding: 18px 28px 14px;
      background: #fff;
      border-bottom: 1px solid #e2ddd5;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    .header .meta {
      font-size: 0.85rem;
      color: #999;
      font-style: italic;
    }

    .header .notes {
      margin-left: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.02em;
    }

    /* ── FILTER BAR ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 10px 28px;
      background: #faf9f6;
      border-bottom: 1px solid #e2ddd5;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      background: #fff;
      color: #555;
      letter-spacing: 0.03em;
    }

    .filter-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-btn.active  { color: #1a1a1a; }
    .filter-btn.inactive { opacity: 0.4; }

    /* ── MAP ── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── POPUPS ── */
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid #e2ddd5 !important;
    }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-family: 'Georgia', serif !important;
    }

    .popup-name {
      font-size: 0.95rem;
      font-weight: bold;
      color: #1a1a1a;
    }

    .popup-cat {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 2px;
    }

    .popup-note {
      font-size: 0.82rem;
      color: #666;
      margin-top: 6px;
      font-style: italic;
    }

    .leaflet-popup-tip { background: #fff !important; }
  </style>
</head>
<body>

<div class="header">
  <h1>London</h1>
  <span class="meta">May 26–27 &nbsp;&middot;&nbsp; 2 nights</span>
  <span class="notes">Uber Boat &nbsp;&middot;&nbsp; Lime Bike &nbsp;&middot;&nbsp; Oyster Card</span>
</div>

<div class="filters" id="filters"></div>

<div id="map"></div>

<script>
  /* ── CATEGORIES ── */
  const cats = {
    hotel:      { label: 'Hotel',       color: '#0d9488' },
    attraction: { label: 'Attractions', color: '#e05c4b' },
    museum:     { label: 'Museums',     color: '#2563eb' },
    restaurant: { label: 'Food',        color: '#ea580c' },
    shopping:   { label: 'Shopping',    color: '#d97706' },
    theatre:    { label: 'Theatre',     color: '#db2777' },
  };

  /* ── PLACES ── */
  const places = [
    // Hotel
    { name: 'Four Seasons Tower Bridge', cat: 'hotel', lat: 51.5101, lon: -0.0779, note: '10 Trinity Square, EC3N 4AJ' },

    // Attractions
    { name: 'Tower Bridge',            cat: 'attraction', lat: 51.5056, lon: -0.0753, note: 'Tower Bridge Road, SE1 2UP' },
    { name: 'Battersea Power Station', cat: 'attraction', lat: 51.4815, lon: -0.1440, note: 'Shopping, dining & cinema — Circus Road West, SW11 8DD' },
    { name: 'Battersea Park',          cat: 'attraction', lat: 51.4796, lon: -0.1568, note: 'Main gates on Albert Bridge Road, SW11 4NJ' },
    { name: 'Westminster Abbey',       cat: 'attraction', lat: 51.4994, lon: -0.1273, note: "Dean's Yard, SW1P 3PA" },
    { name: 'Big Ben & Parliament',    cat: 'attraction', lat: 51.5001, lon: -0.1246, note: 'Palace of Westminster, SW1A 0AA' },
    { name: 'Hyde Park',               cat: 'attraction', lat: 51.5073, lon: -0.1657, note: 'Accessible from Park Lane & Bayswater Road, W2 2UH' },
    { name: 'Covent Garden',           cat: 'attraction', lat: 51.5117, lon: -0.1240, note: 'The Market Building, WC2E 8RF — shops, dining, street performers' },
    { name: 'City of London',          cat: 'attraction', lat: 51.5138, lon: -0.0984, note: "Historic financial district — start at St. Paul's Cathedral, EC2" },

    // Museums
    { name: 'British Museum',          cat: 'museum', lat: 51.5194, lon: -0.1270, note: 'Great Russell Street, WC1B 3DG — Elgin Marbles, Rosetta Stone' },
    { name: 'Natural History Museum',  cat: 'museum', lat: 51.4967, lon: -0.1764, note: 'Cromwell Road, South Kensington, SW7 5BD' },
    { name: 'Tate Britain',            cat: 'museum', lat: 51.4912, lon: -0.1278, note: 'Millbank, SW1P 4RG — world\'s largest Turner collection' },
    { name: 'Imperial War Museum',     cat: 'museum', lat: 51.4958, lon: -0.1088, note: 'Lambeth Road, SE1 6HZ' },

    // Food
    { name: 'Wagamama',                cat: 'restaurant', lat: 51.4828, lon: -0.1460, note: '5 Prospect Way, Battersea Power Station, SW11 8BH' },

    // Shopping
    { name: 'Tottenham Court Road',    cat: 'shopping', lat: 51.5165, lon: -0.1308, note: 'Electronics, furniture & shopping — near Oxford Street & British Museum' },

    // Theatre
    { name: 'Apollo Theatre',          cat: 'theatre', lat: 51.5113, lon: -0.1316, note: 'Shaftesbury Avenue, W1D 7EZ — West End plays' },
  ];

  /* ── MAP ── */
  const map = L.map('map').setView([51.5020, -0.1100], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  /* ── MARKERS ── */
  const markers = {};
  const activeFilters = new Set(Object.keys(cats));

  places.forEach(p => {
    const c = cats[p.cat];

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:14px;height:14px;
        background:${c.color};
        border:2.5px solid #fff;
        border-radius:50%;
        box-shadow:0 1px 5px rgba(0,0,0,0.3);
      "></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });

    const popup = L.popup({ offset: [0, -6], closeButton: false }).setContent(
      `<div class="popup-name">${p.name}</div>` +
      `<div class="popup-cat" style="color:${c.color}">${c.label}</div>` +
      (p.note ? `<div class="popup-note">${p.note}</div>` : '')
    );

    const m = L.marker([p.lat, p.lon], { icon }).addTo(map).bindPopup(popup);

    if (!markers[p.cat]) markers[p.cat] = [];
    markers[p.cat].push(m);
  });

  /* ── FILTER BUTTONS ── */
  const bar = document.getElementById('filters');

  Object.entries(cats).forEach(([key, c]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.dataset.cat = key;
    btn.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.label}`;
    btn.style.borderColor = c.color + '55';

    btn.addEventListener('click', () => {
      if (activeFilters.has(key)) {
        activeFilters.delete(key);
        btn.classList.remove('active');
        btn.classList.add('inactive');
        markers[key]?.forEach(m => m.remove());
      } else {
        activeFilters.add(key);
        btn.classList.add('active');
        btn.classList.remove('inactive');
        markers[key]?.forEach(m => m.addTo(map));
      }
    });

    bar.appendChild(btn);
  });
</script>
</body>
</html>
